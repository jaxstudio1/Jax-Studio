name: Deploy to cPanel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install --legacy-peer-deps

      - name: Build
        working-directory: ./frontend
        run: npx cross-env NODE_ENV=production NODE_OPTIONS=--openssl-legacy-provider webpack

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via lftp
        run: |
          lftp -c "
            set ftp:ssl-allow yes;
            set ftp:ssl-force no;
            set ssl:verify-certificate no;
            open -u '${{ secrets.FTP_USER }}','${{ secrets.FTP_PASS }}' ftp.jaxstudio.ink;
            mirror -R --delete --verbose ./frontend/dist/ /public_html/;
            bye
          "